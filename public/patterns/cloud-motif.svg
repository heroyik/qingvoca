<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <defs>
    <style>
      .cloud-line { fill: none; stroke: currentColor; stroke-width: 1; stroke-linecap: round; }
    </style>
  </defs>
  <!-- Traditional Chinese cloud motif (祥云) -->
  <g opacity="0.08" color="#722F37">
    <!-- Cloud 1 -->
    <path class="cloud-line" d="M15 35 Q15 28 22 28 Q22 22 28 22 Q35 22 35 28 Q42 28 42 35 Q42 42 35 42 Q28 42 28 38 Q22 42 15 35 Z"/>
    <!-- Cloud 2 -->
    <path class="cloud-line" d="M45 20 Q45 15 49 15 Q53 15 53 20 Q58 20 58 25 Q58 30 53 30 Q49 30 45 25 Z"/>
    <!-- Spiral detail on cloud 1 -->
    <path class="cloud-line" d="M22 35 Q25 30 30 32 Q28 36 24 35"/>
