<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B2E38"/>
      <stop offset="100%" stop-color="#722F37"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF77"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Thin gold border inset -->
  <rect x="5" y="5" width="54" height="54" rx="11" ry="11" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <!-- Stylized 清 character -->
  <text x="32" y="44" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="900" fill="url(#gold)">清</text>
  <!-- Small decorative dot top-right -->
  <circle cx="50" cy="12" r="2.5" fill="#D4AF77" opacity="0.5"/>
</svg>
